<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
</head>
<body>
    <h1>Home</h1>

    <h1>{{ context }}</h1>

    {% if user.is_authenticated %}
        <h1>Bem vindo: {{ user }}</h1>
        <button><a href="{% url 'login:logout' %}">Sair da sessão</a></button>
    {% else %}
        <h1>Faça o login</h1>
        <button><a href="{% url 'login:login' %}">Login</a></button>
    {% endif %}
</body>
</html>
